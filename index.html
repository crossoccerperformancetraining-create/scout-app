<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Intelligence - SaaS V67</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://crossoccerperformancetraining-create.github.io/scout-app/logo.jpg?v=2">
    <meta name="theme-color" content="#1e3a8a">

    <style>
        :root { 
            --primary: #1e3a8a; --primary-light: #eff6ff; --bg: #f8fafc; --surface: #ffffff; 
            --text-main: #0f172a; --text-muted: #64748b; --border: #e2e8f0;
            --comp-a: #2563eb; --comp-b: #db2777; 
            --ai-bg: #f5f3ff; --ai-border: #ddd6fe; --ai-text: #5b21b6;
        }
        body.dark-mode {
            --primary: #3b82f6; --primary-light: #1e293b; --bg: #0f172a; --surface: #1e293b; 
            --text-main: #f8fafc; --text-muted: #94a3b8; --border: #334155;
            --ai-bg: #1e293b; --ai-border: #475569; --ai-text: #a5b4fc;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 60px; transition: background 0.3s, color 0.3s; }
        
        /* TELA DE LOGIN E LOADER */
        .auth-wrapper { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: var(--surface); border: 1px solid var(--border); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .auth-title { color: var(--primary); font-size: 1.8rem; font-weight: 900; margin-bottom: 5px; }
        .auth-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text-main); box-sizing: border-box; }
        .auth-error { color: #dc2626; font-size: 0.85rem; margin-bottom: 15px; font-weight: bold; min-height: 15px; }
        .forgot-pass { color: var(--primary); font-size: 0.8rem; text-decoration: underline; cursor: pointer; display: block; margin-top: 15px; font-weight: 600; }
        #global-loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; display: none; place-items: center; z-index: 9999; font-size: 1.2rem; font-weight: bold; flex-direction: column; gap: 10px; }

        /* BARRAS E BOTÕES */
        .top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; position: sticky; top: 0; z-index: 50; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; transition: 0.3s; }
        .brand-container { display: flex; align-items: center; gap: 10px; }
        .brand-text { font-size: 1.2rem; font-weight: 800; color: var(--text-main); } .brand-text span { color: var(--primary); }
        .nav-group { background: var(--bg); padding: 4px; border-radius: 10px; display: flex; gap: 4px; border: 1px solid var(--border); overflow-x: auto; white-space: nowrap; max-width: 100%; scrollbar-width: none; }
        .nav-group::-webkit-scrollbar { display: none; }
        .nav-btn { padding: 8px 16px; border: none; background: transparent; color: var(--text-muted); font-weight: 600; cursor: pointer; border-radius: 8px; transition: 0.2s; font-size: 0.9rem; white-space: nowrap; }
        .nav-btn.active { background: var(--surface); color: var(--primary); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .btn { padding: 8px 12px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.85rem; transition: 0.2s; white-space: nowrap; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #16a34a; color: white; }
        .btn-outline { border: 1px solid var(--border); background: var(--surface); color: var(--text-main); }
        .btn-danger { background: transparent; border: 1px solid #ef4444; color: #ef4444; }
        .btn-danger:hover { background: #ef4444; color: white; }
        .btn-wpp { background: #25D366; color: white; border: none; }
        .btn-card { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border: none; }
        .btn-shadow { background: linear-gradient(135deg, #0f172a, #1e3a8a); color: white; border: none; font-size: 1rem; padding: 12px; }
        
        #network-status { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: bold; color: white; background: #16a34a; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 24px; transition: 0.3s; }

        .visual-input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .visual-input-box { background: var(--primary-light); border: 2px solid var(--border); border-radius: 10px; padding: 12px 5px; text-align: center; position: relative; display: flex; flex-direction: column; justify-content: space-between; height: 65px; transition: 0.3s; }
        .visual-input-box label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; letter-spacing: 0.5px; }
        .visual-input-box h3 { margin: 0; font-size: 1.3rem; line-height: 1; color: var(--text-main); } 
        .visual-input-box select, .visual-input-box input { width: 100%; border: none; background: transparent; text-align: center; text-align-last: center; font-size: 1.1rem; font-weight: 800; color: var(--text-main); outline: none; appearance: none; cursor: pointer; margin-top: auto; }

        .field-container { background: linear-gradient(to bottom, #16a34a, #15803d); height: 550px; position: relative; border-radius: 12px; border: 4px solid white; box-shadow: inset 0 0 20px rgba(0,0,0,0.3); margin-bottom: 20px; overflow: hidden; }
        .field-line-center { position: absolute; top: 50%; width: 100%; height: 2px; background: rgba(255,255,255,0.6); }
        .field-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; }
        .field-box-top { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 200px; height: 80px; border: 2px solid rgba(255,255,255,0.6); border-top: none; }
        .field-box-bottom { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 200px; height: 80px; border: 2px solid rgba(255,255,255,0.6); border-bottom: none; }
        .player-node { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; width: 80px; text-align: center; cursor: pointer; transition: 0.2s; }
        .player-node:hover { transform: translate(-50%, -50%) scale(1.1); z-index: 10; }
        .p-jersey { width: 35px; height: 35px; background: white; border-radius: 50%; border: 3px solid var(--primary); display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .p-jersey img { width: 100%; height: 100%; object-fit: cover; }
        .p-name { background: rgba(0,0,0,0.7); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; margin-top: 2px; font-weight: 600; white-space: nowrap;}
        .p-rating { background: #fbbf24; color: #78350f; padding: 1px 5px; border-radius: 10px; font-size: 0.65rem; font-weight: 800; margin-top: -5px; z-index: 2; border: 1px solid white;}
        
        /* BANNER E ESCUDO FIFA */
        .hero-banner { min-height: 140px; background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); padding: 24px; color: white; position: relative; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
        .avatar-container { width: 100px; height: 100px; border-radius: 50%; background: white; border: 4px solid rgba(255,255,255,0.3); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 2; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        
        .fifa-seal { position: absolute; right: 25px; top: 25px; width: 65px; height: 75px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; z-index: 1; color: white; border-radius: 8px 8px 24px 24px; box-shadow: 0 8px 15px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4); text-shadow: 1px 1px 2px rgba(0,0,0,0.5); transition: 0.3s; }
        .bg-green { background: linear-gradient(135deg, #22c55e, #14532d); }
        .bg-orange { background: linear-gradient(135deg, #f59e0b, #78350f); }
        .bg-red { background: linear-gradient(135deg, #ef4444, #7f1d1d); }

        .trait-btn { background: var(--bg); color: var(--text-main); padding: 6px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; margin-right:5px; margin-bottom:5px; }
        .trait-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; place-items: center; z-index: 100; }
        .modal-box { background: var(--surface); width: 95%; max-width: 700px; max-height: 90vh; overflow-y: auto; padding: 24px; border-radius: 16px; border: 1px solid var(--border); }
        .input-field { width: 100%; padding: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text-main); border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; }
        .input-label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-main); }
        
        .hidden { display: none !important; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .radar-wrapper { height: 250px; display: flex; justify-content: center; align-items: center; }
        
        @media print { 
            .no-print { display: none !important; } 
            .card { background: white !important; page-break-inside: avoid; } 
        }
    </style>
</head>
<body>

    <div id="global-loader">
        <svg width="40" height="40" viewBox="0 0 50 50" stroke="#fff" style="animation: spin 1s linear infinite;"><circle cx="25" cy="25" r="20" fill="none" stroke-width="4" stroke-dasharray="90 150" stroke-linecap="round"></circle></svg>
        <span id="loader-text">Processando...</span>
    </div>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>

    <div id="auth-screen" class="auth-wrapper" style="display:none;">
        <div class="auth-card">
            <div class="brand-text" style="font-size: 2rem; margin-bottom: 10px;"><span>Scout</span> Intelligence</div>
            <div class="auth-subtitle">Acesso Restrito - Cloud SaaS</div>
            <input type="email" id="auth-email" class="auth-input" placeholder="E-mail do Analista">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Senha">
            <div id="auth-error" class="auth-error"></div>
            <button onclick="loginUser()" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 1rem; justify-content: center; margin-bottom: 10px;">Entrar no Sistema</button>
            <button onclick="registerUser()" class="btn btn-outline" style="width: 100%; padding: 12px; font-size: 1rem; justify-content: center;">Criar Nova Conta</button>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        <div class="top-bar no-print">
            <div class="brand-container">
                <div class="brand-text" id="team-name-header"><span>Scout</span> Intelligence</div>
            </div>
            <div id="network-status">🟢 Online</div>
            <div class="nav-group">
                <button onclick="setTab('report')" id="nav-report" class="nav-btn active">Relatório</button>
                <button onclick="setTab('list')" id="nav-list" class="nav-btn">Monitoramento</button>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-primary" onclick="prepareNewPlayer()">+ Novo Atleta</button> 
                <button class="btn btn-danger" onclick="logoutUser()">Sair</button>
            </div>
        </div>

        <div class="container">
            <div id="tab-report">
                <div id="capture-report">
                    <div class="card">
                        <div class="hero-banner">
                            <div id="rep-overall-seal" class="fifa-seal bg-green">0.0</div>
                            <div class="avatar-container"><img id="rep-photo" class="avatar-img" src=""></div>
                            <div class="hero-text">
                                <h1 id="rep-name" style="margin:0;">Nome do Atleta</h1>
                                <p id="rep-pos-label" style="opacity:0.8;">Posição</p>
                            </div>
                        </div>
                        <div style="padding: 20px;">
                            <textarea id="rep-conclusion" class="input-field" style="height:100px;" placeholder="Parecer Técnico..."></textarea>
                            <button id="btn-force-save" onclick="forceSaveAnalysis()" class="btn btn-success" style="width:100%;">💾 Salvar Edições do Relatório</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-list" class="hidden">
                <div class="card" style="padding:15px;">
                    <table style="width:100%; border-collapse:collapse;">
                        <thead style="border-bottom:2px solid var(--border);">
                            <tr><th align="left">Atleta</th><th>Pos</th><th align="right">Ação</th></tr>
                        </thead>
                        <tbody id="list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title">Gerenciar Atleta</h3>
            <form onsubmit="savePlayer(event)" id="form-add">
                <input type="hidden" id="inp-id">
                <label class="input-label">Nome Completo</label>
                <input id="inp-name" class="input-field" required>
                
                <div class="grid-2">
                    <div>
                        <label class="input-label">Posição</label>
                        <select id="inp-pos" class="input-field" onchange="renderStatsInputs()">
                            <option value="GR">Goleiro</option>
                            <option value="ZAG">Zagueiro</option>
                            <option value="LAT">Lateral</option>
                            <option value="VOL">Volante</option>
                            <option value="MEI">Meia</option>
                            <option value="EXT">Extremo</option>
                            <option value="CA">Centroavante</option>
                        </select>
                    </div>
                    <div>
                        <label class="input-label">Clube Atual</label>
                        <input id="inp-club" class="input-field">
                    </div>
                </div>

                <div id="stats-container"></div>

                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="button" onclick="closeModal()" class="btn btn-outline" style="flex:1;">Cancelar</button>
                    <button type="submit" id="btn-save" class="btn btn-primary" style="flex:2;">SALVAR NA NUVEM</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
          apiKey: "AIzaSyBlMXyERUkkEVwcCtmpDCMYROyWXnljnhU",
          authDomain: "scout-d0d1d.firebaseapp.com",
          projectId: "scout-d0d1d",
          storageBucket: "scout-d0d1d.firebasestorage.app",
          messagingSenderId: "485290591237",
          appId: "1:485290591237:web:2ea4049bbe19597149486c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const firestore = firebase.firestore();

        let currentUser = null; 
        let db = []; 
        let currentId = null;

        const CONFIG = { 
            'GR': { off: ['Jogo Pés', 'Reposição'], def: ['Reflexo', '1x1'], phy: ['Foco'] }, 
            'ZAG': { def: ['Duelos', 'Cobertura'], off: ['Passe'], phy: ['Força'] }, 
            'LAT': { def: ['1x1 Def'], off: ['Cruzamento'], phy: ['Resistência'] }, 
            'VOL': { def: ['Duelos'], off: ['Passe'], phy: ['Resistência'] }, 
            'MEI': { def: ['Mapear'], off: ['Passe Final'], phy: ['Agilidade'] }, 
            'EXT': { def: ['Driblador'], off: ['1x1'], phy: ['Velocidade'] }, 
            'CA': { def: ['Pivô'], off: ['Chute'], phy: ['Força'] } 
        };

        // --- AUTH ---
        auth.onAuthStateChanged(user => {
            if (user) { 
                currentUser = user; 
                document.getElementById('auth-screen').style.display = 'none'; 
                document.getElementById('main-app').style.display = 'block'; 
                loadFirestoreData(); 
            } else { 
                document.getElementById('auth-screen').style.display = 'flex'; 
                document.getElementById('main-app').style.display = 'none'; 
            }
        });

        async function loginUser() {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Erro: " + err.message); }
        }

        async function registerUser() {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            try { await auth.createUserWithEmailAndPassword(e, p); } catch(err) { alert("Erro: " + err.message); }
        }

        function logoutUser() { auth.signOut(); }

        // --- DATA ---
        function loadFirestoreData() {
            firestore.collection('users').doc(currentUser.uid).collection('players').onSnapshot(snap => {
                db = [];
                snap.forEach(doc => db.push({id: doc.id, ...doc.data()}));
                renderList();
            });
        }

        function renderList() {
            const body = document.getElementById('list-body');
            body.innerHTML = '';
            db.forEach(p => {
                body.innerHTML += `
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding:10px;">${p.name}</td>
                        <td align="center">${p.pos}</td>
                        <td align="right" style="padding:10px;">
                            <button onclick="editPlayer('${p.id}')" class="btn btn-outline">✏️</button>
                            <button onclick="loadPlayer('${p.id}')" class="btn btn-primary">Ver</button>
                        </td>
                    </tr>
                `;
            });
        }

        function renderStatsInputs() {
            const pos = document.getElementById('inp-pos').value;
            const container = document.getElementById('stats-container');
            const cfg = CONFIG[pos];
            let html = '<div class="grid-3" style="margin-top:15px;">';
            Object.keys(cfg).forEach(cat => {
                cfg[cat].forEach(stat => {
                    html += `<div><label style="font-size:0.7rem;">${stat}</label>
                             <input type="number" class="input-field s-in" d-t="${cat}" d-k="${stat}" min="0" max="10" value="5"></div>`;
                });
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // --- ACTIONS ---
        function prepareNewPlayer() {
            currentId = null;
            document.getElementById('inp-id').value = '';
            document.getElementById('form-add').reset();
            renderStatsInputs();
            document.getElementById('modal-title').innerText = "Novo Atleta";
            openModal();
        }

        function editPlayer(id) {
            const p = db.find(x => String(x.id) === String(id));
            if(!p) return;
            currentId = String(id);
            document.getElementById('inp-id').value = currentId;
            document.getElementById('inp-name').value = p.name;
            document.getElementById('inp-pos').value = p.pos;
            document.getElementById('inp-club').value = p.club || "";
            
            renderStatsInputs();
            
            // Timeout para garantir que o render acima terminou
            setTimeout(() => {
                document.querySelectorAll('.s-in').forEach(el => {
                    const t = el.getAttribute('d-t');
                    const k = el.getAttribute('d-k');
                    if(p.stats && p.stats[t] && p.stats[t][k]) el.value = p.stats[t][k];
                });
            }, 50);

            document.getElementById('modal-title').innerText = "Editando: " + p.name;
            openModal();
        }

        async function savePlayer(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            btn.innerText = "Salvando...";

            const idInp = document.getElementById('inp-id').value;
            const docId = idInp ? String(idInp) : String(Date.now());

            const stats = { off: {}, def: {}, phy: {} };
            document.querySelectorAll('.s-in').forEach(el => {
                stats[el.getAttribute('d-t')][el.getAttribute('d-k')] = parseInt(el.value);
            });

            const pData = {
                name: document.getElementById('inp-name').value,
                pos: document.getElementById('inp-pos').value,
                club: document.getElementById('inp-club').value,
                stats: stats,
                photo: `https://ui-avatars.com/api/?name=${document.getElementById('inp-name').value}&background=random`
            };

            try {
                await firestore.collection('users').doc(currentUser.uid).collection('players').doc(docId).set(pData, {merge: true});
                closeModal();
                alert("Atleta salvo com sucesso!");
            } catch(err) {
                alert("Erro ao salvar: " + err.message);
            }
            btn.innerText = "SALVAR NA NUVEM";
        }

        function loadPlayer(id) {
            const p = db.find(x => String(x.id) === String(id));
            if(!p) return;
            currentId = id;
            document.getElementById('rep-name').innerText = p.name;
            document.getElementById('rep-pos-label').innerText = p.pos + " | " + (p.club || "Sem Clube");
            document.getElementById('rep-photo').src = p.photo;
            document.getElementById('rep-conclusion').value = p.conclusion || "";
            
            // Cálculo básico de média para o selo
            let total = 0, count = 0;
            Object.values(p.stats).forEach(cat => Object.values(cat).forEach(v => { total += v; count++; }));
            document.getElementById('rep-overall-seal').innerText = (total/count).toFixed(1);
            
            setTab('report');
        }

        async function forceSaveAnalysis() {
            const p = db.find(x => String(x.id) === String(currentId));
            if(!p) return;
            const conc = document.getElementById('rep-conclusion').value;
            try {
                await firestore.collection('users').doc(currentUser.uid).collection('players').doc(String(currentId)).update({
                    conclusion: conc
                });
                alert("Parecer atualizado!");
            } catch(err) { alert("Erro: " + err.message); }
        }

        // --- UI UTILS ---
        function setTab(t) {
            document.getElementById('tab-report').classList.add('hidden');
            document.getElementById('tab-list').classList.add('hidden');
            document.getElementById('nav-report').classList.remove('active');
            document.getElementById('nav-list').classList.remove('active');
            
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.getElementById('nav-' + t).classList.add('active');
        }

        function openModal() { document.getElementById('modal').style.display = 'grid'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
